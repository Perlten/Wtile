# This is a basic workflow to help you get started with Actions

name: Build

on: 
  push:
    tags:
      - v*

jobs:
  BuildAndRelease:
    name: Build & Release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Ahk2Exe Main
        uses: nekocodeX/GitHub-Action-Ahk2Exe@main
        with:
          in: main.ahk
          out: wtile.exe
      
      - name: Ahk2Exe Setup
        uses: nekocodeX/GitHub-Action-Ahk2Exe@main
        with:
          in: Setup.ahk
          out: Setup.exe
      
      - name: Make Github Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
           wtile.exe
           Setup.exe
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      # - name: Make Winget release
      #   shell: pwsh
      #   run: |
      #     iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
      #     .\wingetcreate.exe update perlt.wtile -u https://github.com/Perlten/Wtile/releases/download/${{github.ref_name}}/Setup.exe -v ${{github.ref_name}} -t ${{ secrets.WINGET_DEPLOY_PAT }}
